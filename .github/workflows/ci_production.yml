name: CI Production
on:
  push:
    branches:
      - release
permissions:
  contents: read
jobs:
  ci_prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - name: Setup node env
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'pnpm'
          check-latest: true
          node-version: 'latest'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm prepare && pnpm lint
      - name: Run static website generator
        run: pnpm build
      - name: Deploy to website
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          local-dir: dist/spa/
          password: ${{ secrets.OVH_SFTP_PASSWORD }}
          server: ${{ secrets.OVH_SFTP_SERVER }}
          username: ${{ secrets.OVH_SFTP_USERNAME }}
