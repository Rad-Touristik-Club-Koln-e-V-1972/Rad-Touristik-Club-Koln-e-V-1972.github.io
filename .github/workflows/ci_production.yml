name: CI Production
on:
  push:
    branches:
      - release
permissions:
  contents: read
jobs:
  ci_prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup node env
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: "pnpm"
          check-latest: true
          node-version: "latest"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm prepare && pnpm lint
      - name: Run static website generator
        run: pnpm build
      - name: Deploy to website
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          local-dir: dist/spa/
          password: ${{ secrets.OVH_SFTP_PASSWORD }}
          server: ${{ secrets.OVH_SFTP_SERVER }}
          username: ${{ secrets.OVH_SFTP_USERNAME }}
